name: CI

# 두 레인으로 나눈다.
#  - verify   : 모든 push/PR. 저장소 안에서 끝나는 결정론적 게이트만.
#  - live-gates: PR·주간 예약·수동 실행. 브라우저 설치와 production 서버 기동이
#                필요해 run당 분 소모가 큰 게이트를 여기로 모은다.
# push마다 무거운 레인을 돌리지 않는 것이 Actions 분 관리의 핵심이다.

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'docs/**', 'codex/**', 'claude/**']
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 03:00 KST (일요일 18:00 UTC)
    - cron: '0 18 * * 0'
  workflow_dispatch:

# 같은 ref에 연속 push가 나면 앞선 run을 취소한다. 중복 실행 분을 회수한다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'dummy' }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'dummy' }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'dummy' }}

jobs:
  verify:
    name: Verify (docs, types, lint, tests, build)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Documentation contracts
        run: npm run check:docs

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --forceExit

      - name: SLD V3 contract gate
        run: npm run gate:sld-v3-contract

      - name: Build
        run: npm run build

  live-gates:
    name: Live gates (server, PDF, UI smoke)
    needs: verify
    # push 이벤트에서는 건너뛴다. PR·예약·수동 실행에서만 돈다.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 잡 사이에는 파일시스템이 공유되지 않으므로 여기서 다시 빌드한다.
      - name: Build
        run: npm run build

      - name: Live AI calculator receipt gate
        run: npm run gate:chat-live

      - name: Install Chromium for UI smoke
        run: npx playwright install --with-deps chromium

      - name: Live PDF pipeline and UI smoke gates
        shell: bash
        run: |
          npm start -- --hostname 127.0.0.1 --port 3010 > /tmp/esa-next.log 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3010/ > /dev/null; then
              break
            fi
            if ! kill -0 "$app_pid" 2>/dev/null; then
              cat /tmp/esa-next.log
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:3010/ > /dev/null
          npm run gate:pdf -- http://127.0.0.1:3010
          BASE_URL=http://127.0.0.1:3010 npx playwright test
