version: "3.8"

services:
  # ─── ESA Web Application ────────────────────────────────────────
  esa-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY:?set WEAVIATE_API_KEY}
      - DRAWING_JOB_STORE_DIR=/var/lib/esa/drawing-jobs
    env_file:
      - .env
    depends_on:
      weaviate:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - esa-network
    volumes:
      - drawing-job-data:/var/lib/esa/drawing-jobs
    restart: unless-stopped

  # ─── Weaviate Vector Database ───────────────────────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:?set WEAVIATE_API_KEY}
      AUTHENTICATION_APIKEY_USERS: esa-service
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: esa-service
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - esa-network
    restart: unless-stopped

  # ─── Redis Cache ────────────────────────────────────────────────
  redis:
    image: redis:alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - esa-network
    restart: unless-stopped

networks:
  esa-network:
    driver: bridge

volumes:
  weaviate-data:
  redis-data:
  drawing-job-data:
